apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fitness-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/noelmc-ust/Fitness_Tracker
    targetRevision: master
    path: Fitness_Chart

  destination:
    server: https://kubernetes.default.svc
    namespace: fitness-app

  syncPolicy:
    automated:
      prune: true
      selfHeal: true