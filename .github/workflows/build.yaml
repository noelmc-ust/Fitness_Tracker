name: Fitness Tracker Master Pipeline

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'MANDATORY: Enter version (e.g., v1.0.0)'
        required: true

env:
  IMAGE_NAME: nmc9812/fitness-app
  CHART_PATH: ./Fitness_Chart

jobs:
  continuous-integration:
    name: CI Security & Build Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Snyk Security Scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: Build Local Image for Scanning
        run: docker build -t local-scan:${{ github.sha }} .

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'local-scan:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'

  # --- CD STAGE: Runs only when manually triggered ---
  release-production:
    name: CD Release to Production
    if: github.event_name == 'workflow_dispatch'
    needs: continuous-integration 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate Version Tag (Regex v1.0.0)
        id: tag_check
        run: |
          RAW_TAG="${{ github.event.inputs.release_tag }}"
          if [[ ! $RAW_TAG =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid Tag Format. Please use vMAJOR.MINOR.PATCH (e.g., v1.0.5)"
            exit 1
          fi
          echo "FINAL_TAG=$RAW_TAG" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Final Build and Push
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ env.FINAL_TAG }} .
          docker tag ${{ env.IMAGE_NAME }}:${{ env.FINAL_TAG }} ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:${{ env.FINAL_TAG }}
          docker push ${{ env.IMAGE_NAME }}:latest

      - name: Install yq
        run: sudo snap install yq

      - name: Update Helm Chart Values
        run: |
          yq -i '.app.image.tag = "${{ env.FINAL_TAG }}"' ${{ env.CHART_PATH }}/values.yaml

          git config user.name "Fitness-DevOps-Bot"
          git config user.email "devops@fitness-app.com"
          git add ${{ env.CHART_PATH }}/values.yaml
          git commit -m "chore: release ${{ env.FINAL_TAG }} [skip ci]"
          git push origin master


  notify:
    name: Pipeline Notification
    needs: [continuous-integration, release-production]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Get Commit Details
        id: meta
        run: |
          echo "AUTHOR=$(github.actor)" >> $GITHUB_OUTPUT
          echo "SHA_SHORT=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Determine Status & Message
        id: status
        run: |
          if [[ "${{ needs.continuous-integration.result }}" == "failure" ]]; then
            echo "MSG=CI Security/Scan Stage Failed! ❌" >> $GITHUB_OUTPUT
            echo "COLOR=#ff0000" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.release-production.result }}" == "failure" ]]; then
            echo "MSG=CD Release Stage Failed! ❌" >> $GITHUB_OUTPUT
            echo "COLOR=#ff0000" >> $GITHUB_OUTPUT
          else
            echo "MSG=Pipeline Succeeded! 🚀" >> $GITHUB_OUTPUT
            echo "COLOR=#00ff00" >> $GITHUB_OUTPUT
          fi

      - name: Send Email Report
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "${{ steps.status.outputs.MSG }} | Branch: master"
          to: ${{ secrets.DEVELOPMENT_TEAM_EMAIL }}
          from: "Fitness Tracker CI/CD <${{ secrets.MAIL_USERNAME }}>"
          html_body: |
            <h2>${{ steps.status.outputs.MSG }}</h2>
            <p><strong>Author:</strong> ${{ github.actor }}</p>
            <p><strong>Commit ID:</strong> ${{ steps.meta.outputs.SHA_SHORT }}</p>
            <p><strong>Event:</strong> ${{ github.event_name }}</p>
            <hr>
            <p><strong>CI Status:</strong> ${{ needs.continuous-integration.result }}</p>
            <p><strong>CD Status:</strong> ${{ needs.release-production.result || 'Not Run' }}</p>
            <br>
            <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">View Full Logs</a>