apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: fitness-tracker-app
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.app.replicaCount }}

  strategy:
    blueGreen:
      activeService: fitness-active
      previewService: fitness-preview
      autoPromotionEnabled: false

  selector:
    matchLabels:
      app: fitness-tracker-app

  template:
    metadata:
      labels:
        app: fitness-tracker-app
    spec:
      containers:
        - name: fitness-tracker-app
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
          imagePullPolicy: Always

          ports:
            - containerPort: {{ .Values.app.service.targetPort }}

          env:
            - name: MONGODB_URI
              valueFrom:
                configMapKeyRef:
                  name: fitness-configmap
                  key: MONGODB_URI
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: fitness-configmap
                  key: PORT
            - name: HOST
              valueFrom:
                configMapKeyRef:
                  name: fitness-configmap
                  key: HOST
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: fitness-configmap
                  key: NODE_ENV

          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.app.service.targetPort }}
            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.app.service.targetPort }}
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}

---
apiVersion: v1
kind: Service
metadata:
  name: fitness-active
  namespace: {{ .Values.namespace }}
spec:
  ports:
    - port: 80
      targetPort: 5000
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: fitness-preview
  namespace: {{ .Values.namespace }}
spec:
  ports:
    - port: 80
      targetPort: 5000
  type: ClusterIP