apiVersion: v1 
kind: ConfigMap 
metadata:
  name: fitness-configmap 
  namespace: fitness-app
data:
  MONGODB_URI: "mongodb://mongodb-service.fitness-app.svc.cluster.local:27017/fitness-tracker"
  PORT: "5000"
  HOST: "0.0.0.0"
  NODE_ENV: "production"



---
apiVersion: v1
kind: Secret
metadata:
  name: fit-secret
  namespace: fitness-app

stringData:
  DD_TRACE_AGENT_PORT: "8126"
  DD_ENV: "production"
  DD_SERVICE: "fitness-tracker-app"
  DD_VERSION: "1.0.0"

---

apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: fitness-grant
  namespace: fitness-app
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: noel-ns
  to:
    - group: ""
      kind: Service

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: fitness-tracker-app
  namespace: fitness-app
spec:
  replicas: 4
  selector:
    matchLabels:
      app: fitness-tracker-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "200m"
  template:
    metadata:
      labels:
        app: fitness-tracker-app
      annotations:
        ad.datadoghq.com/fitness-tracker-app.logs: >-
          [{"source":"nodejs","service":"fitness-tracker-service"},
           {"source":"nodejs","service":"fitness-tracker-app"}]
    spec:
      containers:
        - name: fitness-tracker-app
          image: pulkit197/fitness_tracker-master-copy3-fitness-app:latest
          ports:
            - containerPort: 5000
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "200m"
          env:
            - name: MONGODB_URI
              valueFrom:
                configMapKeyRef:
                  name: fitness-configmap
                  key: MONGODB_URI
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: fitness-configmap
                  key: PORT
            - name: HOST
              valueFrom:
                configMapKeyRef:
                  name: fitness-configmap
                  key: HOST
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: fitness-configmap
                  key: NODE_ENV    
            # Datadog APM (tracing) env variables
            - name: DD_AGENT_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: DD_TRACE_AGENT_PORT
              valueFrom:
                secretKeyRef:
                  name: fit-secret
                  key: DD_TRACE_AGENT_PORT
            - name: DD_ENV
              valueFrom:
                secretKeyRef:
                  name: fit-secret
                  key: DD_ENV
            - name: DD_SERVICE
              valueFrom:
                secretKeyRef:
                  name: fit-secret
                  key: DD_SERVICE
            - name: DD_VERSION
              valueFrom:
                secretKeyRef:
                  name: fit-secret
                  key: DD_VERSION
---

apiVersion: v1
kind: Service
metadata:
  name: fitness-tracker-service
  namespace: fitness-app
spec:
  selector:
    app: fitness-tracker-app
  ports:
  - port: 80
    targetPort: 5000
  type: NodePort